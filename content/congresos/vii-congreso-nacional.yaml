descripcion: El VII Congreso Nacional de Historia de la Construcción persigue los mismos objetivos que los anteriores congresos: promover y difundir los estudios en este campo y contribuir a que la Historia de la Construcción se convierta, en un futuro próximo, en una disciplina académica reconocida, de rango universitario.
